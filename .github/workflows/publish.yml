name: Publish

# Release: bump version in package.json, commit, tag vX.Y.Z, push tag.
# Auth: npm Trusted Publisher (OIDC) — no NPM_TOKEN needed for publish.
on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="${TAG#v}"
          ACTUAL=$(node -pe "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Tag $TAG does not match package.json version $ACTUAL (expected v$ACTUAL)"
            exit 1
          fi
          echo "Publishing dom-docx@$ACTUAL for tag $TAG"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run build:browser
      - run: npm run guard:inline
      - run: npm run guard:config
      - run: npm run guard:pack-smoke

      - name: Publish to npm
        run: npm publish --access public
